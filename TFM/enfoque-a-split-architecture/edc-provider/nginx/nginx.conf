# =============================================================================
# NGINX Reverse Proxy — Hospital Perimeter Security
# Enfoque A: Split Architecture
#
# Función: Actúa como firewall de aplicación en el perímetro del hospital.
# Solo las IPs del cloud (Control Plane) pueden acceder al Data Plane.
# Todo el tráfico no autorizado recibe 403.
#
# En producción: añadir TLS (ssl_certificate), mTLS (ssl_client_certificate)
# y gestión dinámica de la allowlist.
# =============================================================================

events {
    worker_connections 1024;
}

http {

    # -------------------------------------------------------------------------
    # ALLOWLIST DE IPs AUTORIZADAS
    # Solo las IPs del cloud (donde corre el Control Plane) pueden acceder
    # al Data Plane del hospital.
    #
    # Uso del módulo geo: $allowed_cloud_ip = 1 si la IP está autorizada
    # -------------------------------------------------------------------------
    geo $allowed_cloud_ip {
        default       0;           # Denegar todo por defecto

        # --- Entorno local (desarrollo) ---
        127.0.0.1     1;           # localhost — proceso local del Control Plane
        ::1           1;           # IPv6 localhost
        172.17.0.0/16 1;           # Red interna Docker bridge
        172.18.0.0/16 1;           # Red interna Docker compose

        # --- PRODUCCION: descomentar y añadir las IPs reales del cloud SIMPL ---
        # 203.0.113.10  1;          # IP estática del cloud SIMPL (ejemplo)
        # 203.0.113.11  1;          # IP de failover del cloud SIMPL
    }

    # -------------------------------------------------------------------------
    # FORMATO DE LOG CON AUDITORÍA
    # Registra si la IP estaba autorizada para auditoría de seguridad
    # -------------------------------------------------------------------------
    log_format audit '$remote_addr [$time_local] "$request" '
                     'status=$status bytes=$body_bytes_sent '
                     'cloud_authorized=$allowed_cloud_ip '
                     'ref="$http_referer" ua="$http_user_agent"';

    # -------------------------------------------------------------------------
    # UPSTREAM: apunta al Data Plane del hospital
    # -------------------------------------------------------------------------
    upstream hospital_dataplane_public {
        server 127.0.0.1:39291;
        keepalive 16;
    }

    upstream hospital_dataplane_control {
        server 127.0.0.1:39193;
        keepalive 16;
    }

    # -------------------------------------------------------------------------
    # SERVIDOR PRINCIPAL — puerto 39443
    # Punto único de entrada al hospital desde el exterior
    # -------------------------------------------------------------------------
    server {
        listen 39443;
        server_name hospital.local localhost;

        access_log /var/log/nginx/access.log audit;
        error_log  /var/log/nginx/error.log  warn;

        # Cabeceras de seguridad
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;

        # -----------------------------------------------------------------------
        # Endpoint de datos públicos (transferencias S3)
        # Solo accesible desde IPs del cloud autorizadas
        # -----------------------------------------------------------------------
        location /public/ {
            if ($allowed_cloud_ip = 0) {
                return 403 '{"error":"IP not authorized","remote_addr":"$remote_addr","hint":"Add your IP to nginx.conf allowlist"}';
            }

            proxy_pass         http://hospital_dataplane_public;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            proxy_buffering     off;
        }

        # -----------------------------------------------------------------------
        # Health check — solo desde localhost (para monitorización interna)
        # No accesible desde el cloud
        # -----------------------------------------------------------------------
        location /health {
            allow 127.0.0.1;
            allow ::1;
            deny  all;
            proxy_pass http://hospital_dataplane_public/api/check/health;
        }

        # -----------------------------------------------------------------------
        # Bloquear cualquier otra ruta
        # El Data Plane no debe exponer más endpoints que /public
        # -----------------------------------------------------------------------
        location / {
            return 404 '{"error":"Not found","hint":"Only /public is exposed"}';
        }
    }
}
