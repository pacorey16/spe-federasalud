# =============================================================================
# EDC Provider — Control Plane Configuration
# Simula el conector del hospital en la capa cloud/DMZ
# Enfoque A: Split Architecture
# =============================================================================

# -----------------------------------------------------------------------------
# IDENTIDAD DEL PARTICIPANTE
# -----------------------------------------------------------------------------
edc.participant.id=simpl-hospital-provider
edc.connector.name=Hospital Provider Connector
edc.ids.id=urn:connector:simpl-hospital-provider
edc.component.id=simpl-hospital-provider

# -----------------------------------------------------------------------------
# PUERTOS HTTP
# Separados por función para mayor control y seguridad
# -----------------------------------------------------------------------------
web.http.port=19191
web.http.path=/api

web.http.management.port=19193
web.http.management.path=/management

web.http.protocol.port=19194
web.http.protocol.path=/protocol

web.http.public.port=19291
web.http.public.path=/public

web.http.control.port=19192
web.http.control.path=/control

# -----------------------------------------------------------------------------
# PROTOCOLO DSP (Dataspace Protocol)
# URL que anuncia el Control Plane a otros conectores para negociaciones
# -----------------------------------------------------------------------------
edc.dsp.callback.address=http://localhost:19194/protocol
edc.dataplane.api.public.baseurl=http://localhost:19291/public

# -----------------------------------------------------------------------------
# BASE DE DATOS (PostgreSQL — instancia provider-db en puerto 5432)
# Sin HashiCorp Vault en local: credenciales directas en properties
# -----------------------------------------------------------------------------
edc.datasource.default.url=jdbc:postgresql://localhost:5432/postgres
edc.datasource.default.user=edc
edc.datasource.default.password=edc_password

# EDC necesita datasource separado para las políticas
edc.datasource.policy.url=jdbc:postgresql://localhost:5432/postgres
edc.datasource.policy.user=edc
edc.datasource.policy.password=edc_password

# Crear tablas automáticamente al arrancar (solo para desarrollo local)
edc.sql.schema.autocreate=true

# -----------------------------------------------------------------------------
# AUTENTICACIÓN API
# X-Api-Key usado en todas las llamadas a la Management API
# En producción: JWT firmado + Vault
# -----------------------------------------------------------------------------
edc.api.auth.key=provider-local-api-key

# -----------------------------------------------------------------------------
# ALMACENAMIENTO S3 — Extensión MinIO Gaia-X (fr.gxfs.s3.*)
# IMPORTANTE: El namespace es fr.gxfs.s3.*, NO edc.minio.* ni edc.s3.*
# -----------------------------------------------------------------------------
fr.gxfs.s3.endpoint=http://localhost:9000
fr.gxfs.s3.access.key=minioadmin
fr.gxfs.s3.secret.key=minioadmin

# -----------------------------------------------------------------------------
# IDENTIDAD MOCKEADA — SimplIdentityService (sin Keycloak)
# client.okhttp.type=OkHttpClient activa el modo mock en IamExtension
# mocked.agent.identity.attributes: JSON base64 con roles [CONSUMER, RESEARCHER,
#   SD_PUBLISHER, SD_CONSUMER] — mismo valor en provider y consumer para el PoC
# -----------------------------------------------------------------------------
client.okhttp.type=OkHttpClient
mocked.agent.identity.

# Región para el token de identidad (no crítico en local)
edc.mock.region=eu

# -----------------------------------------------------------------------------
# CONTRACT MANAGER — deshabilitado en local
# EDC gestiona los contratos internamente sin callback externo
# -----------------------------------------------------------------------------
contractmanager.extension.enabled=false
contractmanager.apikey=not-used-in-local
contractmanager.url=http://localhost:8081/contract/v1

# -----------------------------------------------------------------------------
# DATA PLANE — modo split (el Data Plane es un proceso Java separado)
# El Control Plane delega las transferencias al Data Plane registrado
# -----------------------------------------------------------------------------
edc.dataplane.embedded.enabled=false
