# =============================================================================
# EDC Provider — Data Plane Configuration
# Desplegado en la red INTERNA del hospital
# Enfoque A: Split Architecture
#
# Este proceso NO tiene acceso directo a internet.
# Recibe órdenes únicamente del Control Plane a través de NGINX (puerto 39443).
# Solo expone puertos internos (no accesibles desde internet directamente).
# =============================================================================

# -----------------------------------------------------------------------------
# IDENTIDAD DEL DATA PLANE
# Debe ser distinta del Control Plane para que EDC los identifique por separado
# -----------------------------------------------------------------------------
edc.participant.id=simpl-hospital-dataplane
edc.connector.name=Hospital Data Plane
edc.ids.id=urn:connector:simpl-hospital-dataplane
edc.component.id=simpl-hospital-dataplane

# -----------------------------------------------------------------------------
# PUERTOS HTTP DEL DATA PLANE
# Solo expone API interna, public y control
# NO expone management ni protocol (esos son exclusivos del Control Plane)
# -----------------------------------------------------------------------------
web.http.port=39192
web.http.path=/api

# Puerto público: donde los consumidores descargan los datos transferidos
# En producción: NGINX con TLS termina aquí. En local: NGINX en 39443 → 39291
web.http.public.port=39291
web.http.public.path=/public

# Puerto de control: donde el Control Plane envía las órdenes de transferencia
web.http.control.port=39193
web.http.control.path=/control

# -----------------------------------------------------------------------------
# URL DE VALIDACIÓN DE TOKENS
# El Data Plane pregunta al Control Plane si un token de acceso es válido
# Apunta al puerto de control del Control Plane (puerto 19192)
# -----------------------------------------------------------------------------
edc.dataplane.token.validation.endpoint=http://localhost:19192/control/token

# -----------------------------------------------------------------------------
# ALMACENAMIENTO S3 — Extensión MinIO Gaia-X (fr.gxfs.s3.*)
# El Data Plane accede directamente a los datos locales del hospital en S3
# -----------------------------------------------------------------------------
fr.gxfs.s3.endpoint=http://localhost:9000
fr.gxfs.s3.access.key=minioadmin
fr.gxfs.s3.secret.key=minioadmin

# -----------------------------------------------------------------------------
# IDENTIDAD MOCKEADA — SimplIdentityService (sin Keycloak)
# El Data Plane también necesita autenticarse contra otros conectores
# -----------------------------------------------------------------------------
client.okhttp.type=OkHttpClient
mocked.agent.identity.

edc.mock.region=eu

# -----------------------------------------------------------------------------
# CONTRACT MANAGER — deshabilitado
# -----------------------------------------------------------------------------
contractmanager.extension.enabled=false

# -----------------------------------------------------------------------------
# DATA PLANE — modo standalone (este proceso ES el Data Plane)
# edc.dataplane.embedded.enabled=true significa que este proceso actúa
# como Data Plane autónomo (no embebido en un Control Plane)
# -----------------------------------------------------------------------------
edc.dataplane.embedded.enabled=true
