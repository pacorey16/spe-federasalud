# =============================================================================
# EDC Consumer — Control Plane Configuration
# Simula el conector del investigador/sistema consumidor de datos
# Enfoque A: Split Architecture
# =============================================================================

# -----------------------------------------------------------------------------
# IDENTIDAD DEL PARTICIPANTE
# -----------------------------------------------------------------------------
edc.participant.id=simpl-researcher-consumer
edc.connector.name=Researcher Consumer Connector
edc.ids.id=urn:connector:simpl-researcher-consumer
edc.component.id=simpl-researcher-consumer

# -----------------------------------------------------------------------------
# PUERTOS HTTP
# El consumidor usa el rango 29xxx para no colisionar con el proveedor (19xxx)
# -----------------------------------------------------------------------------
web.http.port=29191
web.http.path=/api

web.http.management.port=29193
web.http.management.path=/management

web.http.protocol.port=29194
web.http.protocol.path=/protocol

web.http.public.port=29291
web.http.public.path=/public

web.http.control.port=29192
web.http.control.path=/control

# -----------------------------------------------------------------------------
# PROTOCOLO DSP
# URL que el consumidor anuncia a otros conectores para recibir negociaciones
# -----------------------------------------------------------------------------
edc.dsp.callback.address=http://localhost:29194/protocol
edc.dataplane.api.public.baseurl=http://localhost:29291/public

# -----------------------------------------------------------------------------
# BASE DE DATOS (PostgreSQL — instancia consumer-db en puerto 5433)
# IMPORTANTE: el consumer-db mapea 5433:5432, por eso se usa localhost:5433
# -----------------------------------------------------------------------------
edc.datasource.default.url=jdbc:postgresql://localhost:5433/postgres
edc.datasource.default.user=edc
edc.datasource.default.password=edc_password

edc.sql.schema.autocreate=true

# -----------------------------------------------------------------------------
# AUTENTICACIÓN API
# -----------------------------------------------------------------------------
edc.api.auth.key=consumer-local-api-key

# -----------------------------------------------------------------------------
# ALMACENAMIENTO S3 — Extensión MinIO Gaia-X (fr.gxfs.s3.*)
# El consumidor escribe los resultados de la transferencia en consumer-results
# -----------------------------------------------------------------------------
fr.gxfs.s3.endpoint=http://localhost:9000
fr.gxfs.s3.access.key=minioadmin
fr.gxfs.s3.secret.key=minioadmin

# -----------------------------------------------------------------------------
# IDENTIDAD MOCKEADA — SimplIdentityService (sin Keycloak)
# El consumer lleva el rol RESEARCHER para que el proveedor le autorice el acceso
# -----------------------------------------------------------------------------
client.okhttp.type=OkHttpClient
mocked.agent.identity.

edc.mock.region=eu

# -----------------------------------------------------------------------------
# CONTRACT MANAGER — deshabilitado en local
# -----------------------------------------------------------------------------
contractmanager.extension.enabled=false
contractmanager.apikey=not-used-in-local
contractmanager.url=http://localhost:8080/contract/v1

# -----------------------------------------------------------------------------
# DATA PLANE — embebido en el consumidor
# El consumidor no necesita un Data Plane separado para recibir transferencias S3
# -----------------------------------------------------------------------------
edc.dataplane.embedded.enabled=true
