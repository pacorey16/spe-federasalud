#########################################################################################
# General
#########################################################################################
spring.application.name=edc-connector-adapter

# application profile (provider or consumer)
spring.profiles.active=

spring.cache.type=jcache
spring.cache.jcache.config=classpath:ehcache.xml

logging.config=classpath:log4j2.xml

#########################################################################################
# Json object mapper config
#########################################################################################
# TODO: con spring boot 2 funzionava: con il 3 non sembra funzionare (usato @JsonFormat(with = Feature.ACCEPT_CASE_INSENSITIVE_PROPERTIES))
spring.jackson.mapper.accept-case-insensitive-enums=true


#########################################################################################
# Feign clients
#########################################################################################
# spring & Aruba feign client logging level (NONE, BASIC, HEADERS, FULL)
feign.client.config.default.logger-level=FULL
# spring & Aruba feign client timeouts in milliseconds
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=15000

#########################################################################################
# EDC Connector config
#########################################################################################
# url to the provider EDC connector (internal service)
edc-connector.base-url=https://edc-provider.dev.simpl-europe.eu
edc-connector.deprovisioning.enabled=false

#########################################################################################
# federated-catalogue client
#########################################################################################
# URI to the tier2 tls gateway of the federated catalog application
federated-catalogue.tier2-gateway.uri=https://t2.gaiax-edc-dev-catalogue.dev.simpl-europe.eu
# tier2 tls gateway path configured as route rule to the federated catalog application
federated-catalogue.tier2-gateway.path-prefix=/fc-service


#########################################################################################
# participant
#########################################################################################
# onboarding authority URI
#participant.onboarding.authority.tls.uri=https://t2.iaads-authority-01.dev.simpl-europe.eu
participant.onboarding.authority.tls.uri=https://t2.iaa-authority-tmp.dev.simpl-europe.eu



#########################################################################################
# Web MVC config
#########################################################################################
server.port=8080
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

# http sessions disabled
server.servlet.session.timeout=0
server.servlet.session.persistent=false

# optional list (comma separated) of allowed origins or * to allow all origins
# if empty no cross calls are allowed
web.mvc.cors.allowed-origins=

# if true the Simpl-Cloud-Gateway JWT token must be present as Bearer in any API request
web.mvc.bearer-token.required=true

# optional list (comma separated) of allowed paths (ant matcher expressions) to skip JWT token check (ex: actuator health paths)
web.mvc.bearer-token.allowed-paths=/actuator/health/*,/status,/api-docs/*

# max size limit for single uploaded file (413 - Request Entity Too Large)
spring.servlet.multipart.max-file-size=2MB
# max size limit for whole request (413 - Request Entity Too Large)
spring.servlet.multipart.max-request-size=8MB


#########################################################################################
# Required components config
#########################################################################################

# url to the AuthenticationProvider internal service
authentication-provider.api-url=http://authentication-provider.gaiax-edc-dev-sd.svc.cluster.local:8080


#########################################################################################
# Management
#########################################################################################

# forcing healt probes (livenes and readiness) to be enabled if application is not running as root user
management.endpoint.health.probes.enabled=true


#########################################################################################
# Open Telemetry
#########################################################################################
# disables the OpenTelemetry SDK (true on local dev)
otel.sdk.disabled=true

# resource attributes used to identify the service and environment
otel.resource.attributes.deployment.environment=local-dev
otel.resource.attributes.service.name=edc-connector-adapter

# context propagation type
otel.propagators=tracecontext

# exporter type (otlp, jaeger, zipkin, etc.)
otel.traces.exporter=otlp
# protocol used by the OTLP exporter (http/protobuf or grpc)
otel.exporter.otlp.protocol=http/protobuf
# collector endpoint for the OTLP exporter
otel.exporter.otlp.endpoint=http://localhost:4318

# disable logs exporter (to avoid performance issue on production)
otel.logs.exporter=none

# disable automatic JDBC instrumentation
otel.instrumentation.jdbc.enabled=false
