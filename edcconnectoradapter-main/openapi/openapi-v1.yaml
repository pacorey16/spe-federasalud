openapi: 3.0.1
info:
  title: EDC Connector Adapter API
  description: |-
    APIs enable seamless communication with the EDC Connector, supporting a modular architecture that separates the responsibilities of asset/policy registration, contract negotiation and data consumption. This set of APIs facilitates secure, standardized, and traceable data exchange between providers and consumers in federated data ecosystems.

    ## Business Context

    The EDC Connector Adapter acts as an intermediary between provider-side and consumer-side applications and the EDC Connector. It enables:

    1. Registration and enrichment of assets and policies on the provider side.

    2. Discovery of data offers from provider connector catalog.

    3. Negotiation of usage contracts based on defined policies.

    4. Initiation and monitoring of data transfers.


    ### Key Actors

    - **Provider**: Publishes data assets, defines contract terms, and registers policies.

    - **Consumer**: Searches for offers, negotiates contracts, and consumes data.

    ### Typical Flow

    1. Retrieve Participant Identity

    2. Register and Enrich Assets and Policies

    3. Retrieve Asset Details

    4. Initiate Contract Negotiation

    5. Check Contract Status

    6. Initiate Data Transfer

    7. Monitor Transfer Status
  contact:
    name: Simpl Programme
    url: https://simpl-programme.ec.europa.eu/
    email: cnect-simpl@ec.europa.eu
  license:
    name: European Union Public License (EUPL) 1.2
    url: https://interoperable-europe.ec.europa.eu/sites/default/files/custom-page/attachment/eupl_v1.2_en.pdf
  version: "1.0"
servers:
- url: https://edc-connector-adapter.dev.simpl-europe.eu/v1
security:
- NoAuth: []
paths:
  /transfers:
    post:
      tags:
      - Transfer
      summary: Initiate a new transfer process
      description: Starts a data transfer process using a previously negotiated contract. This operation enables the actual movement of data from provider to consumer.
      operationId: startTransfer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
            examples:
              transferRequest:
                description: transferRequest
                value:
                  contractId: 4a7f28e5-33a9-4f9e-9de9-a4f687502bce
                  dataDestination:
                    bucketName: simpl-cons
                    keyName: test-key-name
                    objectName: european_health_data.csv
                    path: folder1/
                    region: de
                    storage: s3-eu-central-1.ionoscloud.com
                    type: IonosS3
                  providerEndpoint: https://edc-provider.dev.simpl-europe.eu/protocol
                  properties:
                    resourceAddressTemplateId: TPL-1
                    key2: value2
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorProblem'
              examples:
                Internal Server Error Example:
                  description: Internal Server Error Example
                  value:
                    type: urn:problem-type:simpl:internalServerError
                    title: Internal Server Error
                    status: 500
                    detail: Unexpected internal error
                    instance: /transfers
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestProblem'
              examples:
                Bad Request Error Example:
                  description: Bad Request Error Example
                  value:
                    type: urn:problem-type:simpl:validationError
                    title: Invalid payload
                    status: 400
                    detail: missing required arguments
                    issues:
                    - detail: Field 'dataDestination' must not be empty
                    instance: /transfers
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferProcessId'
              examples:
                transferProcessId:
                  description: transferProcessId
                  value:
                    transferProcessId: transfer-process-567890
  /selfDescriptions/enriched:
    post:
      tags:
      - Self Description
      summary: Register a SD json and return it enriched by EDC registration data
      description: Registers asset and policies into the provider EDC, creates a contract definition on EDC connector
      operationId: register
      parameters:
      - name: offeringType
        in: query
        description: offering type
        required: true
        schema:
          type: string
          enum:
          - APPLICATION
          - DATA
          - INFRASTRUCTURE
        example: DATA
      requestBody:
        content:
          application/json:
            schema:
              required:
              - sdJson
              type: object
            examples:
              sdJsonRequest:
                description: sdJsonRequest
                value:
                  sdJson:
                    '@context': http://www.w3.org/ns/odrl.jsonld
                    '@type': Set
                    assigner:
                      role: http://www.w3.org/ns/odrl/2/assigner
                      uid: provider
                    permission:
                    - action:
                      - http://simpl.eu/odrl/actions/search
                      assignee:
                        role: http://www.w3.org/ns/odrl/2/assignee
                        uid: CONSUMER
                      constraint:
                      - leftOperand: http://www.w3.org/ns/odrl/2/dateTime
                        operator: http://www.w3.org/ns/odrl/2/gteq
                        rightOperand: 2024-08-01T00:00:00Z
                      - leftOperand: http://www.w3.org/ns/odrl/2/dateTime
                        operator: http://www.w3.org/ns/odrl/2/lteq
                        rightOperand: 2024-08-31T23:59:59Z
                      target: ""
                    profile: http://www.w3.org/ns/odrl/2/odrl.jsonld
                    target: ""
                    uid: 68777919-f260-4305-9c41-d4266ac0a639
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorProblem'
              examples:
                Internal Server Error Example:
                  description: Internal Server Error Example
                  value:
                    type: urn:problem-type:simpl:internalServerError
                    title: Internal Server Error
                    status: 500
                    detail: Unexpected internal error
                    instance: /selfDescriptions/enriched
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestProblem'
              examples:
                Bad Request Error Example:
                  description: Bad Request Error Example
                  value:
                    type: urn:problem-type:simpl:validationError
                    title: Invalid payload
                    status: 400
                    detail: missing required arguments
                    instance: /selfDescriptions/enriched
                    issues:
                    - detail: Field 'json-ld' must not be empty
        "200":
          description: Successfully registered SD json
          content:
            application/json:
              schema:
                type: string
              examples:
                SD json file registered:
                  description: SD json file registered
                  value:
                    '@context':
                      dcat: http://www.w3.org/ns/dcat#
                      edc: https://w3id.org/edc/v0.0.1/ns/
                    '@id': urn:uuid:9b220110-4482-2113-a786-6ace13b000ee
                    '@type': dcat:Dataset
                    edc:assetId: asset-9876
                    edc:contractDefinitionId: contract-def-45678
                    edc:providerId: simpl-edc-provider-01
  /contracts:
    post:
      tags:
      - Contract
      summary: Initiate a new contract negotiation
      description: Initiates a contract negotiation between a consumer and a provider for a selected data offer. This step is required before any data transfer can occur.
      operationId: startContractNegotiation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractNegotiationRequest'
            examples:
              ContractNegotiationRequest:
                description: ContractNegotiationRequest
                value:
                  assetId: asset-123
                  contractDefinitionId: 961ead7f-d8b2-4fc6-8e94-e3efbe2127ea
                  providerEndpoint: http://endpoint.provider.com
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorProblem'
              examples:
                Internal Server Error Example:
                  description: Internal Server Error Example
                  value:
                    type: urn:problem-type:simpl:internalServerError
                    title: Internal Server Error
                    status: 500
                    detail: Unexpected internal error
                    instance: /contracts
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestProblem'
              examples:
                Bad Request Error Example:
                  description: Bad Request Error Example
                  value:
                    type: urn:problem-type:simpl:validationError
                    title: Invalid payload
                    status: 400
                    detail: missing required arguments
                    issues:
                    - detail: Field 'assetId' must not be empty
                    instance: /contracts
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractNegotiationId'
              examples:
                contractNegotiationId:
                  description: contractNegotiationId
                  value:
                    contractNegotiationId: negotiation-abcd1234
  /connectorCatalog/assets:
    post:
      tags:
      - Contract
      summary: Returns detailed information about the asset available in the connector's catalog, useful for initiating a contract negotiation.
      description: Allows a consumer to extract detailed information about a specific asset of interest from the provider connector's catalog. This provides the preliminary information necessary to initiate the contract negotiation phase.
      operationId: searchCatalogOffers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractNegotiationRequest'
            examples:
              ContractNegotiationRequest:
                description: ContractNegotiationRequest
                value:
                  assetId: asset-123
                  contractDefinitionId: 961ead7f-d8b2-4fc6-8e94-e3efbe2127ea
                  providerEndpoint: http://endpoint.provider.com
        required: true
      responses:
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorProblem'
              examples:
                Internal Server Error Example:
                  description: Internal Server Error Example
                  value:
                    type: urn:problem-type:simpl:internalServerError
                    title: Internal Server Error
                    status: 500
                    detail: Unexpected internal error
                    instance: /catalog/assetDetails
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestProblem'
              examples:
                Bad Request Error Example:
                  description: Bad Request Error Example
                  value:
                    type: urn:problem-type:simpl:validationError
                    title: Invalid payload
                    status: 400
                    detail: missing required arguments
                    issues:
                    - detail: Field 'assetId' must not be empty
                    instance: /catalog/assetDetails
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogSearchResult'
              examples:
                catalogResponse:
                  description: catalogResponse
                  value:
                    offers:
                    - assetId: asset-123-xyz
                      offerId: offer-456-abc
                      policy:
                        id: policy-789-def
                        policyConstraints:
                        - condition: PURPOSE
                          conditionOperator: EQ
                          conditionValue: data-sharing
                        type: USAGE
                      providerEndpointUrl: https://provider-edc.example.com/api/v1/dsp
                      providerParticipantId: provider-id-123456
                    - assetId: asset-789-uvw
                      offerId: offer-321-rst
                      policy:
                        id: policy-654-ghi
                        policyConstraints: []
                        type: ACCESS
                      providerEndpointUrl: https://another-provider.example.com/api/v1/dsp
                      providerParticipantId: provider-id-987654
  /transfers/{transferProcessId}:
    get:
      tags:
      - Transfer
      summary: Returns the transfer process status
      description: Returns the current status of a data transfer process. Allows consumers to monitor the progress and completion of data delivery.
      operationId: getTransferStatus
      parameters:
      - name: transferProcessId
        in: path
        description: The ID of the transfer process to retrieve the status for
        required: true
        schema:
          type: string
      responses:
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorProblem'
              examples:
                Internal Server Error Example:
                  description: Internal Server Error Example
                  value:
                    type: urn:problem-type:simpl:internalServerError
                    title: Internal Server Error
                    status: 500
                    detail: Unexpected internal error
                    instance: /transfers/{transferProcessId}
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestProblem'
              examples:
                Bad Request Error Example:
                  description: Bad Request Error Example
                  value:
                    type: urn:problem-type:simpl:validationError
                    title: Invalid payload
                    status: 400
                    detail: missing required arguments
                    issues:
                    - detail: Field 'transferId' must not be empty
                    instance: /transfers/{transferProcessId}
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferProcess'
              examples:
                transferProcess:
                  description: transferProcess
                  value:
                    id: transfer-process-567890
                    state: COMPLETED
                    type: CONSUMER
                    errorDetail: 
                    dataDestination:
                      type: HttpData
                      baseUrl: https://consumer-destination.example.com
                    contractAgreementId: agreement-xyz789
        "404":
          description: NotFound
          content:
            application/problem+json:
              examples:
                Unauthorized Error Example:
                  description: Unauthorized Error Example
                  value:
                    type: urn:problem-type:simpl:unauthorized
                    title: Unauthorized
                    status: 404
                    detail: Missing or invalid Authorization header
                    instance: /transfers/{transferProcessId}
  /contracts/{contractNegotiationId}:
    get:
      tags:
      - Contract
      summary: Returns the contract negotiation status
      description: Retrieves the current status of a contract negotiation. Useful for tracking the progress and outcome of the negotiation process.
      operationId: getContractNegotiationStatus
      parameters:
      - name: contractNegotiationId
        in: path
        description: The ID of the contract negotiation to retrieve the status for
        required: true
        schema:
          type: string
      responses:
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorProblem'
              examples:
                Internal Server Error Example:
                  description: Internal Server Error Example
                  value:
                    type: urn:problem-type:simpl:internalServerError
                    title: Internal Server Error
                    status: 500
                    detail: Unexpected internal error
                    instance: /contracts/{contractNegotiationId}
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestProblem'
              examples:
                Bad Request Error Example:
                  description: Bad Request Error Example
                  value:
                    type: urn:problem-type:simpl:validationError
                    title: Invalid payload
                    status: 400
                    detail: missing required arguments
                    issues:
                    - detail: Field 'contractId' must not be empty
                    instance: /contracts/{contractNegotiationId}
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractNegotiation'
              examples:
                contractNegotiation:
                  description: contractNegotiation
                  value:
                    id: negotiation-abcd1234
                    state: CONFIRMED
                    counterPartyId: provider-edc-123
                    counterPartyAddress: https://provider-edc.example.com
                    contractAgreementId: agreement-xyz789
  /configs/participant:
    get:
      tags:
      - Config
      summary: Returns the configured EDC participant
      description: Return the configured EDC participant to be used as Assigner in ODRL policies
      operationId: getParticipant
      responses:
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorProblem'
              examples:
                Internal Server Error Example:
                  description: Internal Server Error Example
                  value:
                    type: urn:problem-type:simpl:internalServerError
                    title: Internal Server Error
                    status: 500
                    detail: Unexpected internal error
                    instance: /config/participant
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestProblem'
              examples:
                Bad Request Error Example:
                  description: Bad Request Error Example
                  value:
                    type: urn:problem-type:simpl:validationError
                    title: Invalid payload
                    status: 400
                    detail: missing required arguments
                    instance: /config/participant
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participant'
              examples:
                participant:
                  description: participant
                  value:
                    id: simpl-edc-provider-01
components:
  schemas:
    InternalServerErrorProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        href:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        additionalProperties:
          type: object
          additionalProperties:
            type: object
    BadRequestProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        href:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        issues:
          type: array
          items:
            $ref: '#/components/schemas/InputValidationIssue'
        additionalProperties:
          type: object
          additionalProperties:
            type: object
    InputObject:
      type: object
      properties:
        in:
          type: string
          enum:
          - body
          - path
          - query
          - header
        name:
          type: string
        value:
          type: object
    InputValidationIssue:
      type: object
      properties:
        type:
          type: string
          format: uri
        href:
          type: string
          format: uri
        title:
          type: string
        detail:
          type: string
        in:
          type: string
          enum:
          - body
          - path
          - query
          - header
        name:
          type: string
        value:
          type: object
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/InputObject'
        additionalProperties:
          type: object
          additionalProperties:
            type: object
    JsonNode:
      type: object
    TransferRequest:
      required:
      - contractId
      - dataDestination
      - providerEndpoint
      - templateId
      type: object
      properties:
        providerEndpoint:
          minLength: 1
          type: string
        contractId:
          minLength: 1
          type: string
        templateId:
          minLength: 1
          type: string
        dataDestination:
          $ref: '#/components/schemas/JsonNode'
    TransferProcessId:
      type: object
      properties:
        transferProcessId:
          type: string
    ContractNegotiationRequest:
      required:
      - assetId
      - contractDefinitionId
      - providerEndpoint
      type: object
      properties:
        providerEndpoint:
          minLength: 1
          type: string
        contractDefinitionId:
          minLength: 1
          type: string
        assetId:
          minLength: 1
          type: string
    ContractNegotiationId:
      type: object
      properties:
        contractNegotiationId:
          type: string
    CatalogSearchResult:
      type: object
      properties:
        offers:
          type: array
          items:
            $ref: '#/components/schemas/Dataset'
    Dataset:
      type: object
      properties:
        providerParticipantId:
          type: string
        providerEndpointUrl:
          type: string
        assetId:
          type: string
        offerId:
          type: string
        policy:
          $ref: '#/components/schemas/Policy'
    Policy:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum:
          - ACCESS
          - USAGE
        policyConstraints:
          type: array
          items:
            $ref: '#/components/schemas/PolicyConstraint'
    PolicyConstraint:
      type: object
      properties:
        condition:
          type: string
        conditionOperator:
          type: string
        conditionValue:
          type: string
    TransferProcess:
      type: object
      properties:
        finalState:
          type: string
        assetId:
          type: string
        contractId:
          type: string
        correlationId:
          type: string
        transferType:
          type: string
        errorDetail:
          type: string
        type:
          type: string
        stateTimestamp:
          type: integer
          format: int64
        '@id':
          type: string
        state:
          type: string
    ContractNegotiation:
      type: object
      properties:
        contractAgreementId:
          type: string
        state:
          type: string
        counterPartyAddress:
          type: string
        counterPartyId:
          type: string
        errorDetail:
          type: string
        protocol:
          type: string
        type:
          type: string
        createdAt:
          type: integer
          format: int64
        '@id':
          type: string
    Participant:
      type: object
      properties:
        id:
          type: string
  securitySchemes:
    NoAuth:
      type: apiKey
      description: Placeholder scheme used when security is not required
      name: X-No-Auth
      in: header
