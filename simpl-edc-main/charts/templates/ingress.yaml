{{- if .Values.ingress.enabled  }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    acme.cert-manager.io/http01-edit-in-place: "true"
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "{{ .Values.ingress.corsAllowOrigin }}"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS, PUT, DELETE"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, DNT, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Range"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "86400"
  name: {{ .Release.Name }}-ingress
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - backend:
              service:
                name: {{ .Release.Name }}-service
                port:
                  number: {{ .Values.service.managementPort }}
            path: {{ .Values.ingress.managementPath }}
            pathType: Prefix

          - backend:
              service:
                name: {{ .Release.Name }}-service
                port:
                  number: {{ .Values.service.apiPort }}
            path: {{ .Values.ingress.apiPath }}
            pathType: Prefix

          - backend:
              service:
                name: {{ .Release.Name }}-service
                port:
                  number: {{ .Values.service.protocolPort }}
            path: {{ .Values.ingress.protocolPath }}
            pathType: Prefix

          - backend:
              service:
                name: {{ .Release.Name }}-service
                port:
                  number: {{ .Values.service.publicPort }}
            path: {{ .Values.ingress.publicPath }}
            pathType: Prefix

          - backend:
              service:
                name: {{ .Release.Name }}-service
                port:
                  number: {{ .Values.service.controlPort }}
            path: {{ .Values.ingress.controlPath }}
            pathType: Prefix
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
{{- end }}
