apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simpl-edc-provider
spec:
  project: gaiax
  source:
    repoURL: 'https://code.europa.eu/api/v4/projects/920/packages/helm/stable'
    targetRevision: '>=0.0.0-0.0.0'
    helm:
      valueFiles:
        - values-provider.yaml
    chart: edc
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gaiax-dev-provider
  syncPolicy:
    automated: { }

---

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simpl-edc-consumer
spec:
  destination:
    name: ''
    namespace: gaiax-edc-dev-consumer
    server: 'https://kubernetes.default.svc'
  source:
    repoURL: 'https://code.europa.eu/api/v4/projects/920/packages/helm/stable'
    targetRevision: '>=0.0.0-0.0.0'
    chart: edc
    helm:
      valueFiles:
        - values-consumer.yaml
  sources: []
  project: gaiax
  syncPolicy:
    automated: {}
